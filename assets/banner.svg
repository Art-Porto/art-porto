<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" preserveAspectRatio="xMidYMid meet">
  <title id="title">Arthur Porto - Data Analytics e IA aplicada</title>
  <desc id="desc">Banner horizontal premium com tema de dados, tecnologia, gestão e análise.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#070A10"/>
      <stop offset="0.5" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#05080E"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2DD4BF"/>
      <stop offset="0.5" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>

    <linearGradient id="textGrad" x1="200" y1="104" x2="548" y2="134" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#94A3B8"/>
    </linearGradient>

    <linearGradient id="areaGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="gridMaskGrad" cx="50%" cy="48%" r="62%">
      <stop offset="0%" stop-color="white" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orbTeal" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#2DD4BF" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orbBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#38BDF8" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>

    <mask id="gridMask">
      <rect width="1280" height="360" fill="url(#gridMaskGrad)"/>
    </mask>

    <clipPath id="cardClip">
      <rect x="0" y="0" width="210" height="74" rx="18"/>
    </clipPath>

    <filter id="softGlow" x="-20%" y="-30%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#020617" flood-opacity="0.50"/>
    </filter>
  </defs>

  <rect width="1280" height="360" rx="24" fill="url(#bg)"/>
  <circle cx="196" cy="86" r="190" fill="url(#orbTeal)"/>
  <circle cx="1160" cy="244" r="220" fill="url(#orbBlue)"/>

  <g stroke="#334155" stroke-width="1" mask="url(#gridMask)" stroke-dasharray="4 4">
    <path d="M0 72H1280M0 144H1280M0 216H1280M0 288H1280"/>
    <path d="M120 0V360M240 0V360M360 0V360M480 0V360M600 0V360M720 0V360M840 0V360M960 0V360M1080 0V360M1200 0V360"/>
  </g>

  <g filter="url(#softGlow)">
    <path d="M-50 254 Q 100 300 300 300 Q 500 300 700 280 Q 900 260 1200 320 T 1380 320" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.86"/>
    <path d="M-50 284 Q 100 330 300 330 Q 500 330 700 310 Q 900 290 1200 350 T 1380 350" stroke="#38BDF8" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.42"/>
  </g>

  <g opacity="1">
    <circle cx="300" cy="300" r="6" fill="#0F172A" stroke="#2DD4BF" stroke-width="3"/>
    <circle cx="700" cy="280" r="6" fill="#0F172A" stroke="#38BDF8" stroke-width="3"/>
    <circle cx="1200" cy="320" r="6" fill="#0F172A" stroke="#F59E0B" stroke-width="3"/>
  </g>

  <g transform="translate(80 80)">
    <rect x="0" y="0" width="88" height="88" rx="20" fill="#0B1220" stroke="#1E293B" stroke-width="2"/>
    <path d="M25 62V38M44 62V24M63 62V32" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
    <path d="M20 68H68" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  </g>

  <text x="200" y="124" fill="url(#textGrad)" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="800" letter-spacing="0">
    Arthur Porto
  </text>
  <text x="204" y="168" fill="#38BDF8" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="600" letter-spacing="0">
    Data Analytics <tspan fill="#475569" font-weight="400"> | </tspan> IA Aplicada <tspan fill="#475569" font-weight="400"> | </tspan> Gestão <tspan fill="#475569" font-weight="400"> | </tspan> Finanças
  </text>
  <text x="204" y="212" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="400" letter-spacing="0">
    Dados bem tratados, decisões mais claras e entregas com impacto prático.
  </text>

  <g transform="translate(204 266)">
    <rect x="0" y="0" width="100" height="34" rx="17" fill="#134E4A" opacity="0.3"/>
    <rect x="0" y="0" width="100" height="34" rx="17" fill="none" stroke="#2DD4BF" stroke-width="1.5" opacity="0.8"/>
    <circle cx="18" cy="17" r="4" fill="#2DD4BF"/>
    <text x="32" y="22" fill="#CCFBF1" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" letter-spacing="0">Python</text>

    <g transform="translate(112 0)">
      <rect x="0" y="0" width="80" height="34" rx="17" fill="#0C4A6E" opacity="0.3"/>
      <rect x="0" y="0" width="80" height="34" rx="17" fill="none" stroke="#38BDF8" stroke-width="1.5" opacity="0.8"/>
      <circle cx="18" cy="17" r="4" fill="#38BDF8"/>
      <text x="32" y="22" fill="#E0F2FE" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" letter-spacing="0">SQL</text>
    </g>

    <g transform="translate(204 0)">
      <rect x="0" y="0" width="112" height="34" rx="17" fill="#78350F" opacity="0.3"/>
      <rect x="0" y="0" width="112" height="34" rx="17" fill="none" stroke="#F59E0B" stroke-width="1.5" opacity="0.8"/>
      <circle cx="18" cy="17" r="4" fill="#F59E0B"/>
      <text x="32" y="22" fill="#FEF3C7" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" letter-spacing="0">Power BI</text>
    </g>
  </g>

  <g transform="translate(920 74)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="300" height="174" rx="20" fill="#0B1220" stroke="#1E293B" stroke-width="1.5"/>
    <rect x="24" y="28" width="104" height="12" rx="6" fill="#2DD4BF" opacity="0.76"/>
    <rect x="24" y="54" width="248" height="1" fill="#1E293B"/>

    <g transform="translate(24 84)">
      <rect x="0" y="42" width="28" height="44" rx="6" fill="#2DD4BF" opacity="0.9"/>
      <rect x="48" y="22" width="28" height="64" rx="6" fill="#38BDF8" opacity="0.88"/>
      <rect x="96" y="34" width="28" height="52" rx="6" fill="#2DD4BF" opacity="0.62"/>
      <rect x="144" y="8" width="28" height="78" rx="6" fill="#F59E0B" opacity="0.86"/>
      <rect x="192" y="28" width="28" height="58" rx="6" fill="#38BDF8" opacity="0.64"/>
      <path d="M0 91H240" stroke="#334155" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>

  <g transform="translate(1030 210)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="210" height="74" rx="18" fill="#101827" stroke="#1E293B" stroke-width="1.5"/>
    <path d="M22 48C43 22 58 38 76 28C94 18 108 24 126 18C144 12 157 31 188 18 L188 74 L22 74 Z" fill="url(#areaGradient)" clip-path="url(#cardClip)"/>
    <path d="M22 48C43 22 58 38 76 28C94 18 108 24 126 18C144 12 157 31 188 18" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" fill="none"/>
    <circle cx="188" cy="18" r="5" fill="#F59E0B" stroke="#101827" stroke-width="2"/>
  </g>
</svg>
